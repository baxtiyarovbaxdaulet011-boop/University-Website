<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cars{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.car{
  width:230px;
  background:white;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
  overflow:hidden;
}

.car img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.price{
  color:green;
  font-weight:bold;
  margin:5px 0;
}

.stars{
  color:gold;
  font-size:18px;
}

button{
  background:red;
  color:white;
  border:none;
  padding:8px 15px;
  margin:10px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:darkred;
}
    </style>
</head>
<body>
           <section class="cars">

<div class="car">
  <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=800&q=60">
  <h3>BMW M5</h3>
  <p class="price">$85,000</p>
  <p class="stars">★★★★★</p>
  <button>Buy Now</button>
</div>

<div class="car">
  <img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?auto=format&fit=crop&w=800&q=60">
  <h3>Mercedes S-Class</h3>
  <p class="price">$110,000</p>
  <p class="stars">★★★★★</p>
  <button>Buy Now</button>
</div>

<div class="car">
  <img src="https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6?auto=format&fit=crop&w=800&q=60">
  <h3>Audi A8</h3>
  <p class="price">$95,000</p>
  <p class="stars">★★★★★</p>
  <button>Buy Now</button>
</div>

<div class="car">
  <img src="https://images.unsplash.com/photo-1549921296-3a6b1a0c2b0b?auto=format&fit=crop&w=800&q=60">
  <h3>Range Rover</h3>
  <p class="price">$120,000</p>
  <p class="stars">★★★★★</p>
  <button>Buy Now</button>
</div>

<div class="car">
  <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=800&q=60">
  <h3>Toyota Camry</h3>
  <p class="price">$35,000</p>
  <p class="stars">★★★★☆</p>
  <button>Buy Now</button>
</div>

<div class="car">
  <img src="https://images.unsplash.com/photo-1590362891991-f776e747a588?auto=format&fit=crop&w=800&q=60">
  <h3>Honda Accord</h3>
  <p class="price">$32,000</p>
  <p class="stars">★★★★☆</p>
  <button>Buy Now</button>
</div>

<div class="car">
  <img src="https://images.unsplash.com/photo-1605559424843-9e4c6b3a1f3d?auto=format&fit=crop&w=800&q=60">
  <h3>Tesla Model S</h3>
  <p class="price">$130,000</p>
  <p class="stars">★★★★★</p>
  <button>Buy Now</button>
</div>

<div class="car">
  <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a?auto=format&fit=crop&w=800&q=60">
  <h3>BMW X5</h3>
  <p class="price">$75,000</p>
  <p class="stars">★★★★★</p>
  <button>Buy Now</button>
</div>

</section>
</body>
</html>
