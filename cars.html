<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        

.cars-section{
padding:80px 50px;
background:#181818;
text-align:center;
color:white;
}

.cars-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.car-card{
width:250px;
background:#222;
padding:15px;
border-radius:12px;
transition:0.3s;
}

.car-card:hover{
transform:translateY(-10px);
}

.car-card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:10px;
}

.car-card h2{
margin:10px 0;
}

.car-card span{
display:block;
margin:10px 0;
font-size:20px;
color:red;
}

.car-card button{
padding:10px 20px;
border:none;
background:red;
color:white;
border-radius:5px;
cursor:pointer;
}
    </style>
</head>
<body>
    <section class="cars-section">

<h1>Our Cars</h1>

<div class="cars-container" id="carsContainer"></div>

</section>
<head>
    <body>
        
    


</style>
