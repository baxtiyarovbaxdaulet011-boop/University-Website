<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Showroom</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#222;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-size:18px;
}

.hero{
    text-align:center;
    padding:40px;
}

.hero img{
    width:80%;
    max-width:800px;
    border-radius:15px;
}

.cars{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    width:220px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    border-radius:10px;
}

button{
    background:black;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<header>
<h1>Car Showroom</h1>
<p>Luxury Cars Collection</p>
</header>

<nav>
<a href="#">Home</a>
<a href="./cars.html">Cars</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">

<h2>Welcome To Car Showroom</h2>
<p>Find your dream car here</p>
</section>

<section class="cars">

<div class="card">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">
<h3>BMW</h3>
<p>$45,000</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
<h3>Mercedes</h3>
<p>$50,000</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7">
<h3>Audi</h3>
<p>$42,000</p>
<button>Buy Now</button>
</div>

</section>

<footer>
<p>© 2026 Car Showroom | All Rights Reserved</p>
</footer>

</body>
</html>
